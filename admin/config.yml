              - { label: "Preise – Einleitungssatz", name: preise_lead, widget: string, required: false }
              - { label: "Hinweis Probelektion", name: probe_hinweis, widget: string, required: false }
              - { label: "Überschrift der Sparpakete", name: pakete_ueberschrift, widget: string, required: false }
          - label: "Übersetzungen & Dienstleistungen"
            name: uebersetzungen
            widget: object
            required: false
            fields:
              - { label: "Kleine Überschrift darüber", name: eyebrow, widget: string, required: false }
