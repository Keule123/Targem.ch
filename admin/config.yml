              - { label: "Überschrift", name: ueberschrift, widget: string, required: false }
              - { label: "Einleitungstext", name: lead, widget: text, required: false }
              - { label: "Satz über den Kontakt-Knöpfen", name: direkt_text, widget: string, required: false }

