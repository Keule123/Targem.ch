                name: qualifikationen
                widget: list
                required: false
                field: { label: "Qualifikation", name: qualifikation, widget: string }
              - { label: "Text", name: text, widget: text, required: false, hint: "Für einen neuen Absatz eine LEERE Zeile einfügen." }
          - label: "Sprachkurse & Preise"
            name: sprachkurse
            widget: object
            required: false
            fields:
